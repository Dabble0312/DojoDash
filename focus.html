<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="DojiDash Focus Mode — deep-dive candle analysis with pattern detection and NLP summaries.">
    <title>DojiDash — Focus Mode</title>
    <link rel="icon" href="assets/images/Logo.gif" type="image/gif">
    <link rel="stylesheet" href="tokens.css">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="focus.css">

</head>

<body>

    <div id="usernameDisplay" class="username-display"></div>

    <!-- Focus Mode HUD — replaces streak display -->
    <div id="focusHUD" class="focus-hud">Loading...</div>
    <div id="focusStatus" class="focus-status"></div>

    <!-- Chart — identical div to game.html so styles.css applies -->
    <div class="chart-wrapper">
        <div id="chart"></div>
        <div id="glowOverlay" class="glow-overlay"></div>
    </div>

    <!-- Stats panel — shows metadata from last revealed candle -->
    <div class="stats-panel-header">
        <span class="stats-label">Candle context</span>
        <button id="summaryToggleBtn" class="summary-toggle-btn">
            &#9432; Explain this candle
        </button>
    </div>
    <div class="stats-panel">
        <div class="stat-pill">Trend: <span id="statTrend">—</span></div>
        <div class="stat-pill">Momentum: <span id="statMomentum">—</span></div>
        <div class="stat-pill">Volatility: <span id="statVolatility">—</span></div>
        <div class="stat-pill">RSI: <span id="statRSI">—</span></div>
        <div class="stat-pill">ATR: <span id="statATR">—</span></div>
        <div class="stat-pill">Volume: <span id="statVolume">—</span></div>
        <div class="stat-pill">Candle: <span id="statStrength">—</span></div>
    </div>

    <!-- Summary panel — hidden until user clicks the button -->
    <div id="summaryPanel" class="hidden">
        <span id="summaryText"></span>
    </div>

    <!-- Reveal count selector -->
    <div class="reveal-count-row">
        <label for="revealCount">Candles to reveal:</label>
        <select id="revealCount" class="reveal-count-select">
            <option value="1">1 day</option>
            <option value="2">2 days</option>
            <option value="3">3 days</option>
            <option value="4" selected>4 days</option>
            <option value="5">5 days</option>
            <option value="6">6 days</option>
            <option value="7">7 days</option>
        </select>
    </div>

    <!-- Buttons -->
    <div class="button-row">
        <button id="revealBtn" class="reveal-btn">REVEAL</button>
        <button id="downBtn" class="down">DOWN</button>
        <button id="upBtn" class="up">UP</button>
        <button id="togglePatternsBtn" class="btn-patterns">Show Patterns</button>
        <button id="togglePatternExplainBtn" class="btn-explain-patterns">Explain Patterns</button>
      <button id="narratorBtn" class="btn-narrator">
        <span id="narratorIcon">🔊</span> Narrator Off
          </button>
    </div>

    <!-- Pattern panel — shows detected patterns on visible candles only -->
    <div id="patternPanel" class="hidden"></div>

    <!-- Pattern explanation panel -->
    <div id="patternExplainPanel" class="hidden"></div>

    <!-- Candle info panel — always visible, updates on click -->
    <div id="candleInfo"><span class="candle-info-empty">Click any candle to inspect</span></div>

    <!-- Price feedback panel — always visible, updates on prediction reveal -->
    <div id="priceFeedback"></div>

    <!-- Price target input — shown when UP/DOWN are active -->
    <div class="price-target-row">
        <span class="price-target-label">Price target (optional):</span>
        <input id="priceTarget" type="number" step="0.01" placeholder="e.g. 372.50" class="price-target-input" disabled>
    </div>

    <!-- Popups — identical to game.html -->
    <div id="resultPopup" class="popup hidden">
        <span id="popupResultText"></span>
    </div>

    <div id="wsbPopup" class="wsb-popup">
        <img id="mascotEmoji" class="wsb-emoji">
        <span id="wsbText" class="wsb-text"></span>
    </div>

    <!-- End screen — identical structure to game.html -->
    <div id="endScreen" class="end-screen hidden">
        <div class="end-content">
            <h2>Session Over</h2>
            <p id="resultText"></p>
            <button id="playAgainBtn">Play Again</button>
            <button id="homeBtn">Home</button>
        </div>
    </div>

    <!-- Scripts -->
    <script src="config.js"></script>
    <script
        src="https://cdn.jsdelivr.net/npm/lightweight-charts@4.1.0/dist/lightweight-charts.standalone.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase.js"></script>
    <script src="shared/chart.js"></script>
    <script src="shared/ui.js"></script>
    <script src="focus-summary.js"></script>
    <script src="focus-patterns.js"></script>
    <script src="focus-narate.js"></script>
    <script src="focus-ui.js"></script>
    <script src="focus-core.js"></script>
</body>

</html>
