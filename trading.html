<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DojiDash — Trading Mode</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/lightweight-charts@4.1.0/dist/lightweight-charts.standalone.production.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase.js"></script>
    <style>
        /* ── Two-column layout ── */
        .trading-layout {
            display: grid;
            grid-template-columns: 1fr 280px;
            gap: 16px;
            align-items: start;
        }

        /* ── Right panel ── */
        .tape-panel {
            border: 1px solid rgba(0,0,0,0.08);
            border-radius: 16px;
            overflow: hidden;
            background: #fff;
            display: flex;
            flex-direction: column;
            min-height: 480px;
        }

        .tape-header {
            padding: 12px 14px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.07em;
            color: #64748b;
            border-bottom: 1px solid rgba(0,0,0,0.06);
            background: #f8fafc;
        }

        /* ── Live trade card (top of panel) ── */
        #liveTrade {
            padding: 16px 14px;
            border-bottom: 1px solid rgba(0,0,0,0.06);
            background: #f8fafc;
        }

        #liveTrade.hidden { display: none; }

        .live-direction {
            font-size: 22px;
            font-weight: 800;
            letter-spacing: 1px;
            margin-bottom: 4px;
        }

        .live-entry {
            font-size: 11px;
            color: #94a3b8;
            margin-bottom: 6px;
        }

        .live-price {
            font-size: 26px;
            font-weight: 700;
            color: #0f172a;
            margin-bottom: 4px;
        }

        .live-pl {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .live-duration {
            font-size: 11px;
            color: #94a3b8;
        }

        /* ── Closed trade tape ── */
        .tape-table-wrap {
            flex: 1;
            overflow-y: auto;
        }

        .tape-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
        }

        .tape-table thead th {
            padding: 8px 10px;
            text-align: left;
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #94a3b8;
            border-bottom: 1px solid rgba(0,0,0,0.06);
            background: #fff;
            position: sticky;
            top: 0;
        }

        .tape-table tbody tr {
            border-bottom: 1px solid rgba(0,0,0,0.04);
        }

        .tape-table tbody td {
            padding: 9px 10px;
            color: #0f172a;
            vertical-align: middle;
        }

        /* ── Session summary ── */
        #sessionSummary {
            padding: 12px 14px;
            border-top: 1px solid rgba(0,0,0,0.06);
            background: #f8fafc;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: #64748b;
            margin-bottom: 4px;
        }

        .summary-row strong { color: #0f172a; }

        /* ── HUD + status ── */
        .trading-hud {
            font-size: 0.85rem;
            color: #64748b;
            margin-bottom: 4px;
        }

        .trading-status {
            font-size: 0.9rem;
            font-weight: 600;
            color: #0f172a;
            min-height: 22px;
            margin-bottom: 10px;
        }

        /* ── Button row ── */
        .trading-buttons {
            display: flex;
            gap: 8px;
            margin-top: 12px;
            flex-wrap: wrap;
        }

        .btn-buy  { background: #10b981; color: white; }
        .btn-sell { background: #ef4444; color: white; }
        .btn-exit { background: #6366f1; color: white; }
        .btn-reveal-trading { background: #0f172a; color: white; }

        button.btn-dim {
            opacity: 0.35;
            cursor: not-allowed;
        }

        /* ── End screen ── */
        .end-screen {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(15,23,42,0.92);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 999999;
        }

        .end-content {
            background: white;
            padding: 32px;
            border-radius: 20px;
            text-align: center;
            width: 90%;
            max-width: 380px;
            color: #0f172a;
        }

        .end-content h2 { margin-top: 0; }
        #playAgainBtn { background: #10b981; color: white; width: 100%; margin-bottom: 10px; }
        #homeBtn      { background: #64748b; color: white; width: 100%; }
    </style>
</head>
<body style="padding: 16px;">

    <div id="usernameDisplay" style="font-size:0.9rem;color:#64748b;margin-bottom:4px;"></div>
    <div id="tradingHUD" class="trading-hud">Loading...</div>
    <div id="tradingStatus" class="trading-status"></div>

    <div class="trading-layout">

        <!-- Left: chart -->
        <div>
            <div class="chart-wrapper">
                <div id="chart"></div>
            </div>

            <!-- Buttons below chart -->
            <div class="trading-buttons">
                <button id="revealBtn"
                        class="btn-reveal-trading"
                        onclick="manualReveal()">
                    REVEAL
                </button>
                <button id="buyBtn"
                        class="btn-buy"
                        onclick="enterTrade('BUY')">
                    BUY
                </button>
                <button id="sellBtn"
                        class="btn-sell"
                        onclick="enterTrade('SELL')">
                    SELL
                </button>
                <button id="exitBtn"
                        class="btn-exit"
                        onclick="exitTrade()">
                    EXIT
                </button>
                <button onclick="endSession()"
                        style="background:#94a3b8;color:white;">
                    End Session
                </button>
            </div>
        </div>

        <!-- Right: trade tape panel -->
        <div class="tape-panel">
            <div class="tape-header">Trade Tape</div>

            <!-- Live open trade — large font, top of panel -->
            <div id="liveTrade" class="hidden"></div>

            <!-- Closed trades table -->
            <div class="tape-table-wrap">
                <table class="tape-table">
                    <thead>
                        <tr>
                            <th>Dir</th>
                            <th>Entry</th>
                            <th>Exit</th>
                            <th>P/L</th>
                            <th>Dur</th>
                        </tr>
                    </thead>
                    <tbody id="tapebody"></tbody>
                </table>
            </div>

            <!-- Session summary — updates after each close -->
            <div id="sessionSummary">
                <span style="color:#94a3b8;font-size:12px">No trades yet</span>
            </div>
        </div>

    </div>

    <!-- End screen -->
    <div id="endScreen" class="end-screen hidden">
        <div class="end-content">
            <h2>Session Over</h2>
            <p></p>
            <button id="playAgainBtn">New Session</button>
            <button id="homeBtn">Home</button>
        </div>
    </div>

    <script src="tradingMode.js"></script>
</body>
</html>
