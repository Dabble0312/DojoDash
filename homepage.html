<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DojoDash</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <div class="home-container">

        <h1 class="app-title">DojoDash</h1>

        <p class="tagline">
            Predict the next candle. Build your streak. Sharpen your intuition.
        </p>

        <input 
            id="usernameInput" 
            type="text" 
            placeholder="Enter your name"
            class="username-input"
        >

        <button id="startBtn" class="start-button">
            Start Game
        </button>

        <p class="footer-text">
            A tiny experiment in intuition, probability, and fun.
        </p>

    </div>

    <script src="homepage.js"></script>
</body>
</html>
