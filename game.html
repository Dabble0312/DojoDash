<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DojiDash</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/lightweight-charts@4.1.0/dist/lightweight-charts.standalone.production.js"></script>
</head>
<body>

    <!-- Username + Stats -->
    <div id="usernameDisplay" class="username-display"></div>
    <div id="streakDisplay" class="streak-display">Streak: 0</div>
    <div id="bestDisplay" class="best-display">Best: 0</div>

    <!-- Chart wrapper -->
    <div class="chart-wrapper">
        <div id="chart"></div>
        <div id="glowOverlay" class="glow-overlay"></div>
    </div>

    <!-- Buttons -->
    <button id="downBtn" class="down">DOWN</button>
    <button id="upBtn" class="up">UP</button>

    <!-- Prediction Popup -->
    <div id="resultPopup" class="popup hidden">
        <span id="popupResultText"></span>
    </div>

    <!-- WSB Popup -->
    <div id="wsbPopup" class="wsb-popup">
        <img id="mascotEmoji" class="wsb-emoji">
        <span id="wsbText" class="wsb-text"></span>
    </div>

    <!-- End Screen -->
    <div id="endScreen" class="end-screen hidden">
        <div class="end-content">
            <h2>Run Complete!</h2>
            <p id="resultText"></p>

            <button id="playAgainBtn">Play Again</button>
            <button id="homeBtn">Home</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
