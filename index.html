<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DojiDash</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <div class="home-container">
        <img src="assets/images/Logo.gif" class="home-logo">
        <h1 class="app-title">DojiDash</h1>

        <p class="tagline">
            Predict the next candle. Build your streak. Sharpen your intuition.
        </p>

        <input
            id="usernameInput"
            type="text"
            placeholder="Enter your name"
            class="username-input"
        >

        <button id="startBtn" class="start-button">
            Start Game
        </button>

        <button id="focusBtn" class="start-button" style="background: #6366f1; margin-top: 8px;">
            Focus Mode
        </button>

        <button id="tradingBtn" class="start-button" style="background: #334155; margin-top: 8px;">
            Trading Mode
        </button>

        <!-- No username required — opens directly -->
        <button
            onclick="window.location.href='trading-trainer.html'"
            class="start-button"
            style="background: #0f766e; margin-top: 8px;">
            Learn Basic Concepts
        </button>

        <button onclick="window.location.href='test.html'" class="btn">
            Take Test
        </button>

        <p class="footer-text">
            A tiny experiment in intuition, probability, and fun.
        </p>

    </div>

    <!-- 1. Supabase CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- 2. Shared client — must come before homepage.js -->
    <script src="supabase.js"></script>
    <!-- 3. Page logic -->
    <script src="homepage.js"></script>

    <script>
        document.getElementById("focusBtn").addEventListener("click", () => {
            const username = document.getElementById("usernameInput").value.trim();
            if (username.length === 0) {
                alert("Please enter a name first");
                return;
            }
            localStorage.setItem("username", username);
            window.location.href = "focus.html";
        });

        document.getElementById("tradingBtn").addEventListener("click", () => {
            const username = document.getElementById("usernameInput").value.trim();
            if (username.length === 0) {
                alert("Please enter a name first");
                return;
            }
            localStorage.setItem("username", username);
            window.location.href = "trading.html";
        });
    </script>
</body>
</html>
