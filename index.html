<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DojiDash</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/lightweight-charts@4.1.0/dist/lightweight-charts.standalone.production.js"></script>
</head>
<body>
    <h1>DojiDash</h1>

    <!-- ⭐ Replace your old chart div with this wrapper -->
    <div id="chartWrapper">
        <div id="chart"></div>
        <div id="glowOverlay" class="glow-overlay"></div>
    </div>

    <button id="downBtn" class="down">DOWN</button>
    <button id="upBtn" class="up">UP</button>

    <div id="resultPopup" class="popup hidden">
        <span id="resultText"></span>
    </div>

    <script src="script.js"></script>
</body>
</html>
